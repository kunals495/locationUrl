<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sri Navata Agencies - Order Location</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            width: 100%;
            padding: 40px 30px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .order-display {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            text-align: center;
            border: 2px solid #667eea;
        }

        .order-display h3 {
            color: #333;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .order-display .order-id {
            color: #667eea;
            font-size: 24px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(17, 153, 142, 0.4);
        }

        .btn-success:active {
            transform: translateY(0);
        }

        .btn-success:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .location-icon {
            font-size: 20px;
        }

        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            padding: 12px;
            background: #fee;
            border-radius: 8px;
            border: 1px solid #fcc;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .location-display {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        .location-display.show {
            display: block;
        }

        .location-display h3 {
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
        }

        .location-link {
            display: block;
            color: #667eea;
            text-decoration: none;
            word-break: break-all;
            padding: 12px;
            background: white;
            border-radius: 8px;
            border: 2px solid #667eea;
            transition: all 0.3s ease;
            margin-bottom: 10px;
        }

        .location-link:hover {
            background: #667eea;
            color: white;
        }

        .coordinates {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-size: 14px;
            margin-top: 10px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .success-badge {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px solid #c3e6cb;
            text-align: center;
            font-weight: 600;
        }

        .warning-badge {
            background: #fff3cd;
            color: #856404;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px solid #ffeaa7;
            text-align: center;
        }

        .info-text {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            .logo h1 {
                font-size: 24px;
            }

            .order-display .order-id {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>Sri Navata Agencies</h1>
            <p>Order Location Tracker</p>
        </div>

        <!-- Order ID Display -->
        <div class="order-display">
            <h3>📦 Your Order ID</h3>
            <div class="order-id" id="displayOrderId">Loading...</div>
        </div>

        <!-- Location Sharing -->
        <div class="form-group">
            <label>Share Your Delivery Location</label>
            <p class="info-text">
                📍 We need your exact location to deliver your order accurately to your doorstep.
            </p>
            <button class="btn btn-success" id="shareLocationBtn" onclick="shareLocation()">
                <span class="location-icon">📍</span>
                Share My Location
            </button>
            <div id="locationError" class="error-message"></div>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p id="loadingText">Getting your location...</p>
            </div>
        </div>

        <!-- Location Display -->
        <div id="locationDisplay" class="location-display">
            <h3>✅ Location Captured Successfully!</h3>
            <p style="color: #666; margin-bottom: 10px;">Click the link below to view your location on Google Maps:</p>
            <a id="locationLink" href="#" target="_blank" class="location-link"></a>
            <div class="coordinates">
                <strong>Coordinates:</strong><br>
                <span id="coordsDisplay"></span>
            </div>
            <div id="statusMessage"></div>
        </div>
    </div>

    <script>
        // ==================== CONFIGURATION ====================
        const API_ENDPOINT = 'https://appsheetlocation.onrender.com/receive-location';
        // =======================================================

        let orderId = '';

        // Get Order ID from URL parameter
        function getOrderIdFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('orderId') || '';
        }

        // Initialize page
        window.onload = function() {
            orderId = getOrderIdFromURL();
            
            if (!orderId) {
                document.getElementById('displayOrderId').textContent = 'ERROR: No Order ID';
                document.getElementById('displayOrderId').style.color = '#e74c3c';
                document.getElementById('shareLocationBtn').disabled = true;
                showError(document.getElementById('locationError'), 
                    '❌ Invalid link: Order ID is missing. Please use the link sent to you via WhatsApp.');
                return;
            }

            document.getElementById('displayOrderId').textContent = orderId;
            console.log('📦 Order ID loaded:', orderId);
        };

        // Share location using GPS
        function shareLocation() {
            const locationError = document.getElementById('locationError');
            const loading = document.getElementById('loading');
            const locationDisplay = document.getElementById('locationDisplay');
            const shareBtn = document.getElementById('shareLocationBtn');

            if (!orderId) {
                showError(locationError, '❌ Order ID is missing. Cannot share location.');
                return;
            }

            // Check if geolocation is supported
            if (!navigator.geolocation) {
                showError(locationError, '❌ Geolocation is not supported by your browser');
                return;
            }

            // Disable button and show loading
            shareBtn.disabled = true;
            loading.classList.add('show');
            locationError.classList.remove('show');
            locationDisplay.classList.remove('show');

            console.log('📍 Requesting location for Order ID:', orderId);

            // Get current position
            navigator.geolocation.getCurrentPosition(
                // Success callback
                function(position) {
                    const latitude = position.coords.latitude;
                    const longitude = position.coords.longitude;
                    const accuracy = position.coords.accuracy;

                    console.log('✅ Location obtained:', { latitude, longitude, accuracy });

                    // Create Google Maps URL
                    const googleMapsUrl = `https://www.google.com/maps?q=${latitude},${longitude}`;

                    // Display location and send to server
                    displayLocationAndSend(googleMapsUrl, latitude, longitude, accuracy);
                },
                // Error callback
                function(error) {
                    loading.classList.remove('show');
                    shareBtn.disabled = false;
                    
                    let errorMessage = '';
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            errorMessage = '❌ Location permission denied. Please enable location access in your browser settings.';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            errorMessage = '❌ Location information is unavailable. Please try again.';
                            break;
                        case error.TIMEOUT:
                            errorMessage = '❌ Location request timed out. Please try again.';
                            break;
                        default:
                            errorMessage = '❌ An unknown error occurred. Please try again.';
                    }
                    
                    console.error('Location error:', errorMessage);
                    showError(locationError, errorMessage);
                },
                // Options
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        }

        // Send location data to server
        async function sendDataToServer(orderData) {
            try {
                console.log('📤 Sending data to server:', API_ENDPOINT);
                console.log('📦 Payload:', orderData);

                const response = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(orderData)
                });

                if (!response.ok) {
                    throw new Error(`Server responded with status: ${response.status}`);
                }

                const result = await response.json();
                console.log('✅ Server response:', result);
                
                return result;
            } catch (error) {
                console.error('❌ Error sending data to server:', error);
                throw error;
            }
        }

        // Display location and send to server
        async function displayLocationAndSend(url, lat, lng, accuracy) {
            const loading = document.getElementById('loading');
            const loadingText = document.getElementById('loadingText');
            const locationDisplay = document.getElementById('locationDisplay');
            const locationLink = document.getElementById('locationLink');
            const coordsDisplay = document.getElementById('coordsDisplay');
            const statusMessage = document.getElementById('statusMessage');

            // Update loading text
            loadingText.textContent = 'Sending location to server...';

            // Prepare data to send to server
            const orderData = {
                orderId: orderId,
                location: {
                    latitude: lat,
                    longitude: lng,
                    accuracy: accuracy
                },
                googleMapsUrl: url,
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
            };

            // Send data to server
            try {
                const result = await sendDataToServer(orderData);
                
                // Hide loading
                loading.classList.remove('show');

                // Display location to user
                locationLink.href = url;
                locationLink.textContent = url;
                
                coordsDisplay.innerHTML = `
                    Latitude: ${lat.toFixed(6)}<br>
                    Longitude: ${lng.toFixed(6)}<br>
                    Accuracy: ±${accuracy.toFixed(0)} meters
                `;

                locationDisplay.classList.add('show');

                // Show success message
                if (result.success) {
                    statusMessage.innerHTML = `
                        <div class="success-badge">
                            ✅ Location submitted successfully to Sri Navata Agencies!<br>
                            Order ID: ${orderId}
                        </div>
                    `;
                } else if (result.warning) {
                    statusMessage.innerHTML = `
                        <div class="warning-badge">
                            ⚠️ ${result.message}
                        </div>
                    `;
                }
            } catch (error) {
                // Hide loading
                loading.classList.remove('show');

                // Still show location to user
                locationLink.href = url;
                locationLink.textContent = url;
                
                coordsDisplay.innerHTML = `
                    Latitude: ${lat.toFixed(6)}<br>
                    Longitude: ${lng.toFixed(6)}<br>
                    Accuracy: ±${accuracy.toFixed(0)} meters
                `;

                locationDisplay.classList.add('show');

                // Show warning
                statusMessage.innerHTML = `
                    <div class="warning-badge">
                        ⚠️ Location captured but could not reach server.<br>
                        Please contact support and share the Google Maps link manually.
                    </div>
                `;
            }
        }

        // Helper function to show error messages
        function showError(element, message) {
            element.textContent = message;
            element.classList.add('show');
        }
    </script>
</body>
</html>
